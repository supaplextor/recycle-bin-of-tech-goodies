# /etc/hostapd/hostapd.conf
# Minimal 2.4 GHz WPA2-Personal access point for Debian Linux.
# Install: apt install hostapd
# Enable:  systemctl unmask hostapd && systemctl enable --now hostapd

# Wireless interface to use as the AP (adjust as needed)
interface=wlan0

# Use the nl80211 driver (standard on modern Linux kernels)
driver=nl80211

# SSID broadcast by the AP
ssid=MyNetwork

# 802.11 mode: a=5 GHz, b/g=2.4 GHz, g is the common 2.4 GHz baseline
hw_mode=g

# Channel (1, 6, or 11 are the non-overlapping 2.4 GHz channels)
channel=6

# IEEE 802.11n (HT) support
ieee80211n=1

# Country code — set to your ISO 3166-1 alpha-2 country code
country_code=US

# WPA2 (RSN) only
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP

# Pre-shared key (8–63 ASCII characters)
wpa_passphrase=ChangeMe123!
